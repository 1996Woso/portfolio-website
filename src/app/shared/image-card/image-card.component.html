<div class="card" [ngStyle]="style()">
    <div class="card-img-wrapper">
    <img 
        src="{{imageUrl()}}"
        alt="{{imageAlt()}}"
        class="card-img-top"
    >
    </div>
    <div class="card-body p-1">
        <p class="card-title"  [ngClass]="class()">
            {{imageName()}}
        </p>
        <ng-content />
    </div>
</div>
